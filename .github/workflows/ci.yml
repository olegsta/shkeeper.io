name: ci

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate OpenAPI
        run: PYTHONPATH=. python scripts/export_openapi.py

      - name: Validate OpenAPI
        run: |
          test -f static/openapi/openapi.json

      - name: Preview OpenAPI
        run: head -n 20 static/openapi/openapi.json

      # 🔥 SYNC OPENAPI INTO TAG
      - name: Commit OpenAPI into repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add static/openapi/openapi.json

          git commit -m "chore: update openapi [skip ci]" || echo "no changes"

          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: static/openapi/openapi.json

  docker:
    runs-on: ubuntu-latest
    needs: build-openapi

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: olegprin/shkeeper
          tags: |
            type=ref,event=tag

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  trigger-docs:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Trigger docs build
        run: |
          curl -X POST https://api.github.com/repos/olegsta/shkeeper-docs/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"event_type\":\"build-docs\",\"client_payload\":{\"tag\":\"${GITHUB_REF_NAME}\"}}"