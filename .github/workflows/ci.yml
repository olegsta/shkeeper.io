name: ci

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python (for OpenAPI generation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate OpenAPI (NO SERVER RUN)
        run: |
          flask export-openapi --output static/openapi/openapi.json

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: olegprin/shkeeper
          tags: |
            type=ref,event=tag

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  trigger-docs:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Trigger shkeeper-docs build
        run: |
          curl -L -X POST https://api.github.com/repos/olegsta/shkeeper-docs/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"event_type\":\"build-docs\",\"client_payload\":{\"tag\":\"${GITHUB_REF_NAME}\"}}"